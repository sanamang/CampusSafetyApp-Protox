<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Safety — Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<!-- LOGIN -->
<div id="login-view">
  <div class="login-card">
    <h1>🛡️ Campus Safety</h1>
    <p>Admin & Officer Dashboard</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="admin@campus.edu" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" id="login-btn">Sign In</button>
    <p class="error-msg" id="login-error"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-view">
  <div class="dashboard-grid">

    <!-- Topbar -->
    <header class="topbar">
      <span>🛡️</span>
      <h1>Campus Safety</h1>
      <span class="badge">ADMIN</span>
      <div class="spacer"></div>
      <span class="user-info" id="user-info"></span>
      <button class="logout-btn" id="logout-btn">Sign Out</button>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3>Overview</h3>
        <div class="stat-card danger">
          <div class="stat-label">Active Alerts</div>
          <div class="stat-value" id="stat-active">0</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-label">Acknowledged</div>
          <div class="stat-value" id="stat-ack">0</div>
        </div>
        <div class="stat-card success">
          <div class="stat-label">Resolved Today</div>
          <div class="stat-value" id="stat-resolved">0</div>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Officers Online</h3>
        <div id="officers-list"><p style="color:#555;font-size:13px">Loading…</p></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <nav class="tabs">
        <button class="tab-btn active" data-tab="map">Live Map</button>
        <button class="tab-btn" data-tab="alerts">Alert Queue</button>
        <button class="tab-btn" data-tab="chart">Analytics</button>
      </nav>

      <!-- Map Tab -->
      <div class="tab-panel active" id="tab-map">
        <div id="map"></div>
      </div>

      <!-- Alerts Tab -->
      <div class="tab-panel" id="tab-alerts">
        <div class="alert-table-wrap">
          <div class="filter-row">
            <select class="filter-select" id="filter-status">
              <option value="">All Status</option>
              <option value="pending">Pending</option>
              <option value="acknowledged">Acknowledged</option>
              <option value="resolved">Resolved</option>
            </select>
            <select class="filter-select" id="filter-type">
              <option value="">All Types</option>
              <option value="SOS">SOS</option>
              <option value="Medical">Medical</option>
              <option value="Fire">Fire</option>
              <option value="Suspicious">Suspicious</option>
            </select>
            <input class="filter-input" id="filter-search" placeholder="Search student…" />
          </div>
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Student</th>
                <th>Location</th>
                <th>Status</th>
                <th>Time</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="alerts-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Chart Tab -->
      <div class="tab-panel" id="tab-chart">
        <div class="chart-wrap">
          <h2>Alert Volume (Last 7 Days)</h2>
          <canvas id="alertChart"></canvas>
        </div>
      </div>
    </main>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
